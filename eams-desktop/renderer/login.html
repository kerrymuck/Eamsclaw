<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EAMSCLAW - 企业级AI跨电商客服智能体</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
      background: #f5f7fa;
    }

    /* 左侧蓝色区域 */
    .left-panel {
      width: 45%;
      min-width: 420px;
      background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      color: white;
      position: relative;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 50px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .logo-text {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 2px;
      color: white;
    }

    .main-title {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .sub-title {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .features-list {
      margin-top: 50px;
      list-style: none;
    }

    .features-list li {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      font-size: 16px;
    }

    .feature-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    /* 右侧白色区域 */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 窗口控制按钮 */
    .window-controls {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      z-index: 100;
    }

    .window-btn {
      width: 46px;
      height: 32px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #666;
      transition: all 0.2s;
    }

    .window-btn:hover {
      background: #f0f0f0;
    }

    .window-btn.close:hover {
      background: #ff4d4f;
      color: white;
    }

    .login-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }

    .login-content {
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 600;
      color: #1f1f1f;
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 14px;
      color: #8c8c8c;
    }

    /* 登录类型选择卡片 */
    .login-types {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .login-type-card {
      flex: 1;
      background: white;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .login-type-card:hover {
      border-color: #1890ff;
    }

    .login-type-card.active {
      border-color: #1890ff;
      background: #e6f7ff;
    }

    .type-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .login-type-card.merchant .type-icon {
      background: #e6f7ff;
    }

    .login-type-card.provider .type-icon {
      background: #f6ffed;
    }

    .type-title {
      font-size: 15px;
      font-weight: 600;
      color: #262626;
    }

    .type-desc {
      font-size: 12px;
      color: #8c8c8c;
      text-align: center;
    }

    /* 表单区域 */
    .form-section {
      background: white;
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      height: 44px;
      padding: 0 16px 0 44px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s ease;
      outline: none;
      background: #fafafa;
    }

    .form-input:focus {
      border-color: #1890ff;
      background: white;
      box-shadow: 0 0 0 2px rgba(24,144,255,0.1);
    }

    .form-input::placeholder {
      color: #bfbfbf;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #8c8c8c;
      font-size: 16px;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #595959;
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #1890ff;
    }

    .forgot-link {
      font-size: 13px;
      color: #1890ff;
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      height: 44px;
      background: #1890ff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-btn:hover {
      background: #40a9ff;
    }

    .login-btn:active {
      background: #096dd9;
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .register-section {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #8c8c8c;
    }

    .register-section a {
      color: #1890ff;
      text-decoration: none;
      font-weight: 500;
    }

    .register-section a:hover {
      text-decoration: underline;
    }

    /* 错误提示 */
    .error-message {
      background: #fff2f0;
      border: 1px solid #ffccc7;
      color: #ff4d4f;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #bfbfbf;
    }

    /* 加载动画 */
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 响应式 */
    @media (max-width: 900px) {
      .left-panel {
        display: none;
      }
      
      .login-container {
        padding: 40px 30px;
      }
    }
  </style>
</head>
<body>
  <!-- 左侧蓝色区域 -->
  <div class="left-panel">
    <div class="logo-section">
      <div class="logo-icon">🐱</div>
      <div class="logo-text">EAMSCLAW</div>
    </div>
    
    <h1 class="main-title">企业级AI电商客服中控台</h1>
    <p class="sub-title">一站式多平台智能客服解决方案</p>
    <p class="sub-title">AI驱动，让客服工作更高效、更智能</p>
    
    <ul class="features-list">
      <li>
        <div class="feature-icon">🏪</div>
        <span>多平台统一管理</span>
      </li>
      <li>
        <div class="feature-icon">🤖</div>
        <span>AI智能回复</span>
      </li>
      <li>
        <div class="feature-icon">📊</div>
        <span>数据智能分析</span>
      </li>
    </ul>
  </div>

  <!-- 右侧白色区域 -->
  <div class="right-panel">
    <!-- 窗口控制按钮 -->
    <div class="window-controls">
      <button class="window-btn minimize" onclick="minimizeWindow()" title="最小化">−</button>
      <button class="window-btn close" onclick="closeWindow()" title="关闭">×</button>
    </div>

    <div class="login-container">
      <div class="login-content">
        <div class="login-header">
          <h1>欢迎登录</h1>
          <p>请选择您的身份类型</p>
        </div>

        <!-- 登录类型选择 -->
        <div class="login-types">
          <div class="login-type-card merchant active" data-type="merchant" onclick="selectType('merchant')">
            <div class="type-icon">🏪</div>
            <div class="type-title">商家登录</div>
            <div class="type-desc">店铺管理、客服工作台</div>
          </div>
          <div class="login-type-card provider" data-type="provider" onclick="selectType('provider')">
            <div class="type-icon">🏢</div>
            <div class="type-title">服务商登录</div>
            <div class="type-desc">代理商管理、商户管理</div>
          </div>
        </div>

        <!-- 表单区域 -->
        <div class="form-section">
          <div class="error-message" id="errorMsg"></div>
          
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <div class="form-input-wrapper">
                <span class="input-icon">👤</span>
                <input 
                  type="text" 
                  class="form-input" 
                  id="username" 
                  placeholder="请输入用户名"
                  autocomplete="username"
                >
              </div>
            </div>

            <div class="form-group">
              <div class="form-input-wrapper">
                <span class="input-icon">🔒</span>
                <input 
                  type="password" 
                  class="form-input" 
                  id="password" 
                  placeholder="请输入密码"
                  autocomplete="current-password"
                >
              </div>
            </div>

            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" id="rememberMe">
                <span>记住密码</span>
              </label>
              <a href="#" class="forgot-link" onclick="handleForgotPassword(); return false;">忘记密码?</a>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
              <span id="btnText">商家登录</span>
            </button>
          </form>

          <div class="register-section">
            还没有账号？<a href="#" onclick="handleRegister(); return false;">立即注册</a>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      © 2026 EAMSCLAW 企业级AI电商客服中控台. All rights reserved.
    </div>
  </div>

  <script>
    // 当前选中的登录类型
    let currentType = 'merchant';

    // 选择登录类型
    function selectType(type) {
      currentType = type;
      document.querySelectorAll('.login-type-card').forEach(card => {
        card.classList.toggle('active', card.dataset.type === type);
      });
      document.getElementById('btnText').textContent = type === 'provider' ? '服务商登录' : '商家登录';
    }

    // 窗口控制
    function minimizeWindow() {
      if (window.electronAPI) {
        window.electronAPI.minimizeWindow();
      }
    }

    function closeWindow() {
      if (window.electronAPI) {
        window.electronAPI.closeWindow();
      } else {
        window.close();
      }
    }

    // 登录处理
    async function handleLogin(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const errorMsg = document.getElementById('errorMsg');
      const loginBtn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');

      if (!username) {
        showError('请输入用户名');
        return;
      }
      if (!password) {
        showError('请输入密码');
        return;
      }

      loginBtn.disabled = true;
      btnText.innerHTML = '<span class="loading"></span>登录中...';
      errorMsg.classList.remove('show');

      try {
        // 保存账号信息到主进程（用于下次自动选择）
        if (window.electronAPI && window.electronAPI.saveAccount) {
          await window.electronAPI.saveAccount({
            username: username,
            userType: currentType,
            rememberMe: rememberMe
          });
        }
        
        if (window.electronAPI) {
          const result = await window.electronAPI.login({
            userType: currentType,
            username,
            password,
            rememberMe
          });
          
          if (!result.success) {
            showError(result.message || '登录失败，请检查账号密码');
            loginBtn.disabled = false;
            btnText.textContent = currentType === 'provider' ? '服务商登录' : '商家登录';
          }
        } else {
          console.log('Login:', { userType: currentType, username, password });
          alert(`登录成功！\n类型: ${currentType === 'provider' ? '服务商' : '商家'}\n账号: ${username}`);
          loginBtn.disabled = false;
            btnText.textContent = currentType === 'provider' ? '服务商登录' : '商家登录';
        }
      } catch (error) {
        showError('登录失败，请稍后重试');
        console.error('Login error:', error);
        loginBtn.disabled = false;
        btnText.textContent = currentType === 'provider' ? '服务商登录' : '商家登录';
      }
    }

    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = message;
      errorMsg.classList.add('show');
    }

    function handleForgotPassword() {
      alert('请联系管理员重置密码\n客服电话：400-xxx-xxxx');
    }

    function handleRegister() {
      if (currentType === 'provider') {
        alert('服务商注册请联系商务人员\n商务电话：400-xxx-xxxx');
      } else {
        alert('商家注册功能即将开放，敬请期待！');
      }
    }

    // 记住账号功能
    window.addEventListener('DOMContentLoaded', async () => {
      // 从主进程获取保存的账号信息
      if (window.electronAPI && window.electronAPI.getSavedAccount) {
        const saved = await window.electronAPI.getSavedAccount();
        if (saved) {
          if (saved.username) {
            document.getElementById('username').value = saved.username;
          }
          if (saved.rememberMe) {
            document.getElementById('rememberMe').checked = true;
          }
          selectType(saved.userType || 'merchant');
        } else {
          selectType('merchant');
        }
      } else {
        selectType('merchant');
      }
    });

    // 保存账号（当勾选记住密码时）
    document.getElementById('rememberMe').addEventListener('change', async (e) => {
      if (window.electronAPI && window.electronAPI.saveAccount) {
        const username = document.getElementById('username').value.trim();
        await window.electronAPI.saveAccount({
          username: username,
          userType: currentType,
          rememberMe: e.target.checked
        });
      }
    });
  </script>
</body>
</html>
