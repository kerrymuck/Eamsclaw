<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- 森林渐变 -->
    <linearGradient id="forest" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c1e"/>
      <stop offset="100%" style="stop-color:#4a7c4e"/>
    </linearGradient>
    <!-- 金色 -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffed4e"/>
    </linearGradient>
  </defs>
  
  <!-- 圆形徽章背景 -->
  <circle cx="100" cy="100" r="95" fill="url(#forest)" stroke="url(#gold)" stroke-width="3"/>
  
  <!-- 龙猫简版 -->
  <!-- 身体 -->
  <ellipse cx="100" cy="110" rx="55" ry="50" fill="#5a8a5a"/>
  
  <!-- 肚子 -->
  <ellipse cx="100" cy="115" rx="35" ry="30" fill="#e8e4c9"/>
  
  <!-- 耳朵 -->
  <ellipse cx="70" cy="60" rx="12" ry="20" fill="#5a8a5a"/>
  <ellipse cx="130" cy="60" rx="12" ry="20" fill="#5a8a5a"/>
  
  <!-- 眼睛 -->
  <circle cx="85" cy="95" r="10" fill="white"/>
  <circle cx="115" cy="95" r="10" fill="white"/>
  <circle cx="85" cy="95" r="5" fill="#1a1a1a"/>
  <circle cx="115" cy="95" r="5" fill="#1a1a1a"/>
  
  <!-- 鼻子 -->
  <ellipse cx="100" cy="108" rx="6" ry="4" fill="#1a1a1a"/>
  
  <!-- 肚子花纹 -->
  <path d="M85,115 Q92,108 100,115 Q108,108 115,115" fill="none" stroke="#7a9a7a" stroke-width="2" stroke-linecap="round"/>
  <path d="M80,128 Q90,120 100,128 Q110,120 120,128" fill="none" stroke="#7a9a7a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 头顶叶子 -->
  <path d="M100,45 Q85,30 100,15 Q115,30 100,45" fill="#4a7c4e"/>
  <line x1="100" y1="45" x2="100" y2="65" stroke="#4a7c4e" stroke-width="2"/>
  
  <!-- 文字 -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffd700" text-anchor="middle">TOTORO AGENT</text>
  <text x="100" y="188" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,215,0,0.8)" text-anchor="middle">TEAM</text>
</svg>
