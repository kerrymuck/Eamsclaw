<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 背景圆形 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="chatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 外圈 -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)"/>
  
  <!-- 内部装饰圆 -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- E 字母 - 代表 EAMS -->
  <text x="55" y="125" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="white">E</text>
  
  <!-- 聊天气泡 -->
  <g transform="translate(95, 65)">
    <path d="M10,0 L50,0 Q60,0 60,10 L60,45 Q60,55 50,55 L35,55 L25,65 L20,55 L10,55 Q0,55 0,45 L0,10 Q0,0 10,0 Z" 
          fill="url(#chatGradient)" filter="url(#shadow)"/>
    <!-- 气泡内的AI标识 -->
    <circle cx="30" cy="28" r="12" fill="white"/>
    <text x="30" y="33" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#667eea" text-anchor="middle">AI</text>
  </g>
  
  <!-- 连接点 - 代表多平台 -->
  <circle cx="45" cy="150" r="4" fill="white" opacity="0.8"/>
  <circle cx="60" cy="155" r="3" fill="white" opacity="0.6"/>
  <circle cx="75" cy="152" r="3" fill="white" opacity="0.6"/>
  
  <!-- 底部文字 -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">EAMS</text>
</svg>
